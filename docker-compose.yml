services:
  teambuilder-web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Synchronise le dossier actuel avec le dossier /app du conteneur
      - .:/app
    environment:
      # Ces variables activent le mode développement de Flask
      # Le serveur redémarrera tout seul à chaque modification du code
      - FLASK_APP=app.py
      - FLASK_DEBUG=1

  db:
      image: mysql:8.0
      restart: always
      environment:
        MYSQL_DATABASE: $MYSQL_DATABASE
        MYSQL_USER: $MYSQL_USER
        MYSQL_PASSWORD: $MYSQL_PASSWORD
        MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
      ports:
        - "3306:3306"
      volumes:
        - mysql_data:/var/lib/mysql

  volumes:
    mysql_data:
